<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicine Reminder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>💊 Health Reminder</h1>

    <div class="form-box">
        <input type="text" id="medicineName" placeholder="Enter Medicine Name">
        <input type="time" id="medicineTime">
        <button onclick="setReminder()">Set Reminder</button>
    </div>

    <div id="notificationBox" class="hidden">
        <h2 id="notifyText"></h2>
        <button onclick="markDone()">✔ Done</button>
        <button onclick="markNotDone()">❌ Not Done</button>
    </div>

    <div class="report">
        <h3>📋 Report</h3>
        <ul id="reportList"></ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
